<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Streamy Remote</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Streamy">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a14">
<link rel="manifest" href="/manifest-remote.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a14;--bg2:#12121f;--bg3:#1a1a2e;--border:rgba(255,255,255,.06);
  --t1:#f0f0f5;--t2:#a0a0b8;--t3:#606078;
  --accent:#7c5af0;--accent2:#9d7afa;--accent-s:rgba(124,90,240,.15);
  --green:#4ade80;--red:#f87171;--r:14px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* ─── Layout ─────────────────────────────── */
.app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto}
.header{padding:18px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.logo{font-size:22px;font-weight:700;color:var(--accent2)}
.logo span{color:var(--t3);font-weight:400;font-size:15px;margin-left:8px}
.now-playing{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:14px;min-height:80px}
.np-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0}
.np-icon{width:52px;height:52px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;color:var(--t3)}
.np-info{flex:1;min-width:0}
.np-title{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-artist{font-size:14px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.np-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--accent-s);color:var(--accent2);white-space:nowrap}

/* ─── Search ─────────────────────────────── */
.search-wrap{padding:16px 20px 10px}
.search-box{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:0 16px;transition:border .2s}
.search-box:focus-within{border-color:var(--accent)}
.search-box svg{color:var(--t3);flex-shrink:0;width:18px;height:18px}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:17px;padding:16px 0;font-family:inherit}
.search-box input::placeholder{color:var(--t3)}
.search-clear{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:none;color:var(--t3);font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center}

/* ─── Content ────────────────────────────── */
.content{flex:1;overflow-y:auto;padding:8px 0}
.section-hd{padding:10px 20px;font-size:12px;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase}

/* Results */
.result{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .15s}
.result:active{background:var(--accent-s)}
.r-thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.r-info{flex:1;min-width:0}
.r-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-artist{font-size:13px;color:var(--t2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-dur{font-size:12px;color:var(--t3);margin-top:3px}
.r-add{width:48px;height:48px;border-radius:12px;background:var(--accent-s);border:none;color:var(--accent2);font-size:24px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s}
.r-add:active{background:var(--accent)}
.r-add.added{background:rgba(74,222,128,.15);color:var(--green)}

/* Queue items */
.q-item{display:flex;align-items:center;gap:14px;padding:14px 20px}
.q-pos{width:28px;font-size:14px;color:var(--t3);text-align:center;flex-shrink:0;font-weight:600}
.q-info{flex:1;min-width:0}
.q-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-artist{font-size:12px;color:var(--t3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Empty states */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 20px;text-align:center}
.empty-ico{font-size:52px;margin-bottom:16px;opacity:.6}
.empty-txt{font-size:17px;font-weight:600;color:var(--t2);margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--t3);max-width:280px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:48px}
.spin{width:28px;height:28px;border:3px solid var(--bg3);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast-area{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:14px 22px;border-radius:12px;font-size:14px;font-weight:500;color:#fff;animation:toastIn .3s ease;pointer-events:auto;max-width:90vw;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast.success{background:rgba(74,222,128,.9)}
.toast.error{background:rgba(248,113,113,.9)}
.toast.info{background:rgba(124,90,240,.9)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Tabs */
.tabs{display:flex;gap:0;padding:0 20px;border-bottom:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:14px 0;font-size:15px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border .2s}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}

</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">🎵 Streamy<span>Remote</span></div>
  </div>

  <!-- Now Playing Bar -->
  <div class="now-playing" id="np">
    <div class="np-icon" id="np-icon">🎵</div>
    <img class="np-thumb" id="np-thumb" style="display:none">
    <div class="np-info">
      <div class="np-title" id="np-title">Nothing playing</div>
      <div class="np-artist" id="np-artist">Search for a song below</div>
    </div>
    <div class="np-badge" id="np-badge" style="display:none">Playing</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tab-search" onclick="switchTab('search')">Search</div>
    <div class="tab" id="tab-popular" onclick="switchTab('popular')">Popular</div>
    <div class="tab" id="tab-queue" onclick="switchTab('queue')">Queue <span id="q-count"></span></div>
  </div>

  <!-- Search Section -->
  <div id="view-search">
    <div class="search-wrap">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search for a song…" autocomplete="off" enterkeyhint="search">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div id="results"></div>
  </div>

  <!-- Queue Section -->
  <div id="view-queue" style="display:none">
    <div id="queue-list"></div>
  </div>

  <!-- Popular Section -->
  <div id="view-popular" style="display:none">
    <div class="section-hd" style="padding-top:16px">Most Played</div>
    <div id="popular-list"><div class="loading"><div class="spin"></div></div></div>
  </div>
</div>

<div class="toast-area" id="toast-area"></div>

<script>
// ─── State ────────────────────────────────────────────────────
let ws, queue = [], currentTrack = null, playbackState = {};
let searchTimer = null;

// ─── WebSocket ────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onmessage = e => {
    const { event, data } = JSON.parse(e.data);

    if (event === 'state') {
      queue = data.queue || [];
      currentTrack = data.currentTrack;
      playbackState = data.playbackState || {};
      refreshNP(); renderQueue();
    }
    if (event === 'trackChange') {
      currentTrack = data.currentTrack;
      queue = data.queue || queue;
      playbackState = data.playbackState || playbackState;
      refreshNP(); renderQueue();
    }
    if (event === 'queueUpdate') {
      queue = data.queue || [];
      renderQueue();
    }
    if (event === 'playbackState') {
      playbackState = data;
      refreshNP();
    }
    if (event === 'timeUpdate') {
      playbackState.position = data.position;
      playbackState.duration = data.duration;
    }
    if (event === 'notification') {
      toast(data.message, data.type || 'info');
    }
  };

  ws.onclose = () => setTimeout(connectWS, 2000);
  ws.onerror = () => ws.close();
}

// ─── Now Playing ──────────────────────────────────────────────
function refreshNP() {
  const t = currentTrack;
  const icon = document.getElementById('np-icon');
  const thumb = document.getElementById('np-thumb');
  const badge = document.getElementById('np-badge');

  if (!t) {
    icon.style.display = 'flex'; thumb.style.display = 'none';
    document.getElementById('np-title').textContent = 'Nothing playing';
    document.getElementById('np-artist').textContent = 'Search for a song below';
    badge.style.display = 'none';
    return;
  }

  document.getElementById('np-title').textContent = t.title;
  document.getElementById('np-artist').textContent = t.artist;

  if (t.thumbnail) { thumb.src = t.thumbnail; thumb.style.display = ''; icon.style.display = 'none'; }
  else { thumb.style.display = 'none'; icon.style.display = 'flex'; }

  badge.style.display = '';
  badge.textContent = playbackState.playing ? 'Playing' : 'Paused';
  badge.style.background = playbackState.playing ? 'rgba(74,222,128,.15)' : 'rgba(251,191,36,.15)';
  badge.style.color = playbackState.playing ? 'var(--green)' : '#fbbf24';
}

// ─── Search ───────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const clearBtn    = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  clearBtn.style.display = searchInput.value ? 'flex' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(searchInput.value.trim()), 400);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { clearTimeout(searchTimer); doSearch(searchInput.value.trim()); }
});

function clearSearch() {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  document.getElementById('results').innerHTML = '';
}

async function doSearch(q) {
  const el = document.getElementById('results');
  if (!q) { el.innerHTML = ''; return; }

  el.innerHTML = '<div class="loading"><div class="spin"></div></div>';

  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (!d.results?.length) {
      el.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div><div class="empty-txt">No results</div><div class="empty-sub">Try a different search term</div></div>';
      return;
    }
    el.innerHTML = '<div class="section-hd">Results</div>' + d.results.map((t, i) => `
      <div class="result" id="res-${i}">
        <img class="r-thumb" src="${esc(t.thumbnail)}" loading="lazy" onerror="this.style.display='none'">
        <div class="r-info">
          <div class="r-title">${esc(t.title)}</div>
          <div class="r-artist">${esc(t.artist)}</div>
          <div class="r-dur">${fmtTime(t.duration)}</div>
        </div>
        <button class="r-add" onclick="event.stopPropagation();addToQueue(${i})" id="btn-${i}">+</button>
      </div>
    `).join('');

    // Store results for adding
    window._results = d.results;
  } catch {
    el.innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Search failed</div><div class="empty-sub">Check your connection</div></div>';
  }
}

async function addToQueue(i) {
  const t = window._results?.[i];
  if (!t) return;

  const btn = document.getElementById(`btn-${i}`);
  if (btn) { btn.classList.add('added'); btn.textContent = '✓'; }

  try {
    await fetch('/api/queue/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(t),
    });
    toast(`Added: ${t.title.slice(0, 40)}`, 'success');
  } catch {
    toast('Failed to add', 'error');
    if (btn) { btn.classList.remove('added'); btn.textContent = '+'; }
  }

  // Reset button after 2s
  setTimeout(() => { if (btn) { btn.classList.remove('added'); btn.textContent = '+'; } }, 2000);
}

// ─── Queue ────────────────────────────────────────────────────
function renderQueue() {
  const el = document.getElementById('queue-list');
  const countEl = document.getElementById('q-count');
  countEl.textContent = queue.length ? `(${queue.length})` : '';

  if (!queue.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">🎵</div><div class="empty-txt">Queue is empty</div><div class="empty-sub">Search for songs and tap + to add them</div></div>';
    return;
  }

  el.innerHTML = '<div class="section-hd">Up Next</div>' + queue.map((t, i) => `
    <div class="q-item">
      <div class="q-pos">${i + 1}</div>
      <img class="r-thumb" src="${esc(t.thumbnail)}" loading="lazy" style="width:40px;height:40px" onerror="this.style.display='none'">
      <div class="q-info">
        <div class="q-title">${esc(t.title)}</div>
        <div class="q-artist">${esc(t.artist)}</div>
      </div>
    </div>
  `).join('');
}

// ─── Tabs ─────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-search').classList.toggle('active', tab === 'search');
  document.getElementById('tab-popular').classList.toggle('active', tab === 'popular');
  document.getElementById('tab-queue').classList.toggle('active', tab === 'queue');
  document.getElementById('view-search').style.display   = tab === 'search' ? '' : 'none';
  document.getElementById('view-popular').style.display  = tab === 'popular' ? '' : 'none';
  document.getElementById('view-queue').style.display    = tab === 'queue'  ? '' : 'none';
  if (tab === 'popular' && !window._popularLoaded) loadPopular();
}

async function loadPopular() {
  const el = document.getElementById('popular-list');
  try {
    const r = await fetch('/api/popular');
    const d = await r.json();
    window._popularLoaded = true;
    if (!d.results?.length) { el.innerHTML = '<div class="empty"><div class="empty-ico">🎵</div><div class="empty-txt">No tracks found</div></div>'; return; }
    window._popular = d.results;
    el.innerHTML = d.results.map((t, i) => `
      <div class="result" id="pop-${i}">
        <img class="r-thumb" src="${esc(t.thumbnail)}" loading="lazy" onerror="this.style.display='none'">
        <div class="r-info">
          <div class="r-title">${esc(t.title)}</div>
          <div class="r-artist">${esc(t.artist)}</div>
          <div class="r-dur">${fmtTime(t.duration)}</div>
        </div>
        <button class="r-add" onclick="event.stopPropagation();addPopular(${i})" id="pbtn-${i}">+</button>
      </div>
    `).join('');
  } catch {
    el.innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Could not load</div></div>';
  }
}

async function addPopular(i) {
  const t = window._popular?.[i];
  if (!t) return;
  const btn = document.getElementById(`pbtn-${i}`);
  if (btn) { btn.classList.add('added'); btn.textContent = '✓'; }
  try {
    await fetch('/api/queue/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(t) });
    toast(`Added: ${t.title.slice(0, 40)}`, 'success');
  } catch {
    toast('Failed to add', 'error');
    if (btn) { btn.classList.remove('added'); btn.textContent = '+'; }
  }
  setTimeout(() => { if (btn) { btn.classList.remove('added'); btn.textContent = '+'; } }, 2000);
}

// ─── Utilities ────────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmtTime(s) { if (!s) return ''; const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${String(sec).padStart(2,'0')}`; }

function toast(msg, type) {
  const area = document.getElementById('toast-area');
  const t = document.createElement('div');
  t.className = `toast ${type || 'info'}`;
  t.textContent = msg;
  area.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2500);
}

// ─── Init ─────────────────────────────────────────────────────
connectWS();
</script>
</body>
</html>
