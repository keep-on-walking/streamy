services:
  streamy:
    build: .
    container_name: streamy
    restart: unless-stopped
    network_mode: host          # host networking so RTSP is reachable on LAN
    # Alternatively, use explicit port mapping (replace network_mode: host):
    # ports:
    #   - "3000:3000"           # Web UI + WebSocket
    #   - "8554:8554"           # RTSP TCP
    #   - "8554:8554/udp"       # RTSP UDP
    #   - "8555:8555/udp"       # RTSP UDP alt
    environment:
      - NODE_ENV=production
      - PORT=3000
      - RTSP_PORT=8554
      - RTSP_WIDTH=1280
      - RTSP_HEIGHT=720
      - RTSP_BITRATE=2M
      - RTSP_ENABLED=true
    volumes:
      - streamy-cache:/tmp      # persist yt-dlp cache and overlay files
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  streamy-cache:
